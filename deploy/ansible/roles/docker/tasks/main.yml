---
- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker Engine + plugins
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable + start docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add ubuntu user to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

# ---------- ECR credential helper ----------
- name: Install amazon-ecr-credential-helper
  ansible.builtin.apt:
    name: amazon-ecr-credential-helper
    state: present

- name: Ensure /root/.docker exists
  ansible.builtin.file:
    path: /root/.docker
    state: directory
    mode: "0700"

- name: Configure docker to use ecr-login for ECR hosts
  ansible.builtin.copy:
    dest: /root/.docker/config.json
    mode: "0600"
    content: |
      {
        "credHelpers": {
          "{{ ecr_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com": "ecr-login"
        }
      }
