<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김현태 — Backend Engineer</title>
  <meta name="description" content="백엔드 엔지니어 김현태의 포트폴리오" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', stored || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a class="brand" href="/">현태.dev</a>
      <div class="nav-links">
        <a class="nav-link" href="/about">About</a>
        <a class="nav-link" href="https://github.com/HyeonTee" target="_blank" rel="noopener">GitHub</a>
      </div>
      <button id="theme-toggle" aria-label="Toggle theme">☾</button>
    </div>
  </nav>

  <main>
    <div class="container">
      <p class="greeting-box">
        <span id="typed-greeting" data-text="안녕하세요, 백엔드 개발자 김현태입니다."></span>
      </p>

      <section class="section">
        <h2 class="section-title">About</h2>
        <p>
          부산대학교 기계공학부를 졸업한 후 프로그래밍에 흥미가 생겨
          컴퓨터 공학과 백엔드 엔지니어링을 공부하며 개발자로 일하고 있습니다.
        </p>
        <p>
          자세한 이력은 <a href="/about">About</a> 페이지에서 확인하실 수 있습니다.
        </p>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 김현태 · served by Rust web_server</div>
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
