name: deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "static/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  id-token: write    # required for OIDC
  contents: read

jobs:
  build-and-deploy:
    name: Build, push to ECR, restart EC2
    runs-on: ubuntu-latest

    env:
      AWS_REGION:    ${{ vars.AWS_REGION }}
      ECR_REPO_URL:  ${{ vars.ECR_REPOSITORY_URL }}
      INSTANCE_ID:   ${{ vars.EC2_INSTANCE_ID }}
      IMAGE_SHA_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REPO_URL }}:latest
            ${{ env.ECR_REPO_URL }}:${{ env.IMAGE_SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger EC2 to pull + restart via SSM
        id: ssm
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids  "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment       "deploy $IMAGE_SHA_TAG (gh-actions run $GITHUB_RUN_ID)" \
            --parameters    "commands=[\"docker pull ${ECR_REPO_URL}:latest\",\"systemctl restart web_server\"]" \
            --query         "Command.CommandId" \
            --output        text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command $CMD_ID — waiting for completion..."
          aws ssm wait command-executed \
            --command-id  "$CMD_ID" \
            --instance-id "$INSTANCE_ID"
          echo "--- stdout ---"
          aws ssm get-command-invocation \
            --command-id  "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query       "StandardOutputContent" \
            --output      text

      - name: Smoke test
        run: |
          for path in / /about /static/css/style.css; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://hyeontae.cloud$path")
            echo "$path -> $code"
            [ "$code" = "200" ] || exit 1
          done
